<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Prototype</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="device-frame">
        <div class="screen-container" id="app-container">
            <!-- Screens will be injected here via JS -->
        </div>
        <div class="bottom-nav" id="bottom-nav" style="display: none;">
            <div class="nav-item" onclick="navigateTo('home')">
                <div class="icon-placeholder"></div>
                <span>Home</span>
            </div>
            <div class="nav-item" onclick="navigateTo('search')">
                <div class="icon-placeholder"></div>
                <span>Search</span>
            </div>
            <div class="nav-item" onclick="navigateTo('notifications')">
                <div class="icon-placeholder"></div>
                <span>Alerts</span>
            </div>
            <div class="nav-item" onclick="navigateTo('profile')">
                <div class="icon-placeholder"></div>
                <span>Profile</span>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
